[build]
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888

[[redirects]]
  from = "/api/analyze-receipt"
  to = "/.netlify/functions/analyze-receipt"
  status = 200

[[redirects]]
  from = "/api/analyze-email-receipt"
  to = "/.netlify/functions/analyze-email-receipt"
  status = 200

[[redirects]]
  from = "/api/analyze-document"
  to = "/.netlify/functions/analyze-document"
  status = 200

[[redirects]]
  from = "/api/chat-assistant"
  to = "/.netlify/functions/chat-assistant"
  status = 200

[[redirects]]
  from = "/api/chat-assistant-assets"
  to = "/.netlify/functions/chat-assistant-assets"
  status = 200

[[redirects]]
  from = "/api/chat-assistant-budget"
  to = "/.netlify/functions/chat-assistant-budget"
  status = 200

[[redirects]]
  from = "/api/chat-assistant-vault"
  to = "/.netlify/functions/chat-assistant-vault"
  status = 200

[[redirects]]
  from = "/api/vault-verify-pin"
  to = "/.netlify/functions/vault-verify-pin"
  status = 200

